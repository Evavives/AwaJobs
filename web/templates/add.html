<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AwaJobs — Ajouter une offre</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f8f7f4; --surface:#fff; --border:#e5e3de; --text:#1a1a18; --muted:#6b6966; --accent:#2563eb; --radius:10px; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; height: 56px; gap: 1rem; }
    .logo { font-weight: 600; font-size: 16px; }
    .logo span { color: var(--accent); }
    a { color: var(--accent); text-decoration: none; }
    .container { max-width: 680px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--muted); }
    input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); margin-bottom: 1rem; }
    textarea { height: 140px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .btn { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; }
    .btn-secondary { background: var(--surface); color: var(--text); margin-left: 8px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: -12px; margin-bottom: 1rem; }
  </style>
</head>
<body>
<header>
  <div class="logo">Awa<span>Jobs</span></div>
  <a href="/">← Retour</a>
</header>
<div class="container">
  <h1>Ajouter une offre manuellement</h1>
  <p style="color:var(--muted);font-size:14px;margin-bottom:1.5rem;">
    Pour les offres LinkedIn, X, ResearchGate ou tout autre site — colle les infos ici.
  </p>
  <div class="card">
    <form method="POST" action="/add">
      <label>Titre du poste *</label>
      <input type="text" name="title" placeholder="Ex : Postdoc in Social Neuroscience" required>

      <label>URL de l'offre *</label>
      <input type="url" name="url" placeholder="https://..." required>

      <label>Source</label>
      <select name="source">
        <option>LinkedIn</option>
        <option>X / Twitter</option>
        <option>ResearchGate</option>
        <option>Email / Liste de diffusion</option>
        <option>Autre</option>
      </select>

      <label>Localisation</label>
      <input type="text" name="location" placeholder="Ex : Bruxelles, Belgique">

      <label>Description / texte de l'offre</label>
      <textarea name="description" placeholder="Colle ici le texte de l'offre pour que le scoring fonctionne…"></textarea>
      <div class="hint">Plus tu mets de texte, meilleur sera le score automatique.</div>

      <button type="submit" class="btn">Ajouter l'offre</button>
      <a href="/"><button type="button" class="btn btn-secondary">Annuler</button></a>
    </form>
  </div>
</div>
</body>
</html>
