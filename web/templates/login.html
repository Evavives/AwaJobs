<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AwaJobs — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border: 1px solid #e0dfd8;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 340px;
    }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    input:focus { border-color: #888; }
    .error {
      margin-top: 10px; font-size: 13px; color: #c00;
      background: #fff0f0; border-radius: 6px; padding: 8px 12px;
    }
    button {
      margin-top: 1.5rem; width: 100%; padding: 10px;
      background: #1a1a18; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AwaJobs</h1>
    <p class="sub">Radar emploi personnel</p>
    <form method="POST">
      <label>Mot de passe</label>
      <input type="password" name="password" autofocus>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Se connecter</button>
    </form>
  </div>
</body>
</html>
